name: Release — Patient App (TestFlight + Play Internal)

# Rodar manualmente via: eas workflow:run .eas/workflows/release.yml
# Ou automaticamente em tags v*
on:
  push:
    branches: ["main"]
    paths: ["apps/patient-app/app.json"]

jobs:
  ios_testflight:
    name: iOS TestFlight
    type: build
    params:
      platform: ios
      profile: testflight

  android_production:
    name: Android AAB (Play Store)
    type: build
    params:
      platform: android
      profile: production

name: Mobile Android (Capacitor)

on:
  push:
    branches:
      - "release/mobile-*"
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track (internal | alpha | beta | production)"
        required: false
        default: "internal"

concurrency:
  group: mobile-android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"
  JAVA_VERSION: "21"
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Capacitor sync
        run: ./apps/web/node_modules/.bin/cap sync android

      - name: Decode Android keystore
        if: ${{ github.event_name != 'pull_request' && env.HAVE_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          HAVE_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/release.keystore
          echo "ANDROID_KEYSTORE_PATH=$PWD/android/release.keystore" >> $GITHUB_ENV

      - name: Build signed AAB
        if: ${{ env.ANDROID_KEYSTORE_PATH != '' }}
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$ANDROID_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Build unsigned AAB (PR / no keystore)
        if: ${{ env.ANDROID_KEYSTORE_PATH == '' }}
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fisioflow-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Build APK universal (debug-friendly)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fisioflow-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to Play Console
        if: ${{ startsWith(github.ref, 'refs/tags/mobile-v') && env.PLAY_SERVICE_ACCOUNT_PRESENT == 'true' }}
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          PLAY_SERVICE_ACCOUNT_PRESENT: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
          TRACK: ${{ github.event.inputs.track || 'internal' }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > /tmp/play-service-account.json
          npx --yes @googleapis/androidpublisher upload \
            --packageName=com.moocafisio.fisioflow \
            --track="$TRACK" \
            --aab=android/app/build/outputs/bundle/release/app-release.aab \
            --serviceAccount=/tmp/play-service-account.json || \
            echo "::warning::Play Console upload failed — check service-account permissions"

name: EAS Build — Patient App

# Triggers:
#  1. Push em main com mudanças no patient-app → simulator automático
#  2. workflow_dispatch → escolha livre de plataforma + perfil
on:
  push:
    branches: [main]
    paths:
      - "apps/patient-app/**"
      - ".easignore"
      - ".github/workflows/eas-dev-build.yml"
  workflow_dispatch:
    inputs:
      platform:
        description: "Plataforma"
        type: choice
        options: [ios, android, all]
        default: ios
      profile:
        description: "Perfil de build"
        type: choice
        options:
          - development:simulator
          - development
          - preview
          - testflight
          - production
        default: development:simulator

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.platform || 'ios' }}-${{ inputs.profile || 'development:simulator' }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build (${{ inputs.platform || 'ios' }} / ${{ inputs.profile || 'development:simulator' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build via EAS
        working-directory: apps/patient-app
        run: |
          PLATFORM="${{ inputs.platform || 'ios' }}"
          PROFILE="${{ inputs.profile || 'development:simulator' }}"

          if [ "$PLATFORM" = "all" ]; then
            eas build --platform all --profile "$PROFILE" --non-interactive
          else
            eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive
          fi

      - name: Print install instructions
        if: ${{ startsWith(inputs.profile || 'development:simulator', 'development') }}
        run: |
          echo ""
          echo "========================================================"
          echo "  BUILD CONCLUIDO — Como instalar:"
          echo ""
          echo "  Acesse: https://expo.dev/accounts/rafaelminatto/projects/fisioflow-patient/builds"
          echo ""
          echo "  iOS Simulator (development:simulator):"
          echo "  1. Baixe o .tar.gz do build"
          echo "  2. xcrun simctl install booted FisioFlowPaciente.app"
          echo "  3. xcrun simctl launch booted com.fisioflow.patients"
          echo ""
          echo "  iPhone fisico (development):"
          echo "  1. Abra o link do build no iPhone"
          echo "  2. Instala direto via OTA (sem App Store)"
          echo "  Obs: precisa ter o UDID registrado via: eas device:create"
          echo ""
          echo "  Android:"
          echo "  1. Baixe o APK do link acima"
          echo "  2. Instale com: adb install *.apk"
          echo ""
          echo "  Apos instalar: pnpm --dir apps/patient-app start:dev-client"
          echo "========================================================"

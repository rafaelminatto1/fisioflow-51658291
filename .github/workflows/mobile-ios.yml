name: Mobile iOS (Capacitor)

on:
  push:
    branches:
      - "release/mobile-*"
    tags:
      - "mobile-v*"
  workflow_dispatch:

concurrency:
  group: mobile-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"
  XCODE_VERSION: "16.2"
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}

jobs:
  build:
    name: Build iOS Archive
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
        continue-on-error: true

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Add iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then
            ./apps/web/node_modules/.bin/cap add ios
          fi

      - name: Capacitor sync
        run: ./apps/web/node_modules/.bin/cap sync ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/App/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/App/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install Pods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Setup signing
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          HAVE_SIGNING_SECRETS: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          # Decode certificate
          echo "$IOS_DISTRIBUTION_CERT_BASE64" | base64 -d > /tmp/cert.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$IOS_CERT_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          UUID=$(grep -aA1 UUID /tmp/profile.mobileprovision | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Build archive (signed)
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        working-directory: ios/App
        env:
          HAVE_SIGNING_SECRETS: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/FisioFlow.xcarchive \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME" \
            CODE_SIGN_STYLE=Manual \
            archive

      - name: Build archive (unsigned dry-run)
        if: ${{ env.HAVE_SIGNING_SECRETS != 'true' }}
        working-directory: ios/App
        env:
          HAVE_SIGNING_SECRETS: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Export IPA
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        env:
          HAVE_SIGNING_SECRETS: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>method</key><string>app-store</string>
              <key>teamID</key><string>$DEVELOPMENT_TEAM</string>
              <key>signingStyle</key><string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>com.moocafisio.fisioflow</key>
                <string>$PROVISIONING_PROFILE_NAME</string>
              </dict>
            </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/FisioFlow.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/export \
            || echo "::warning::xcodebuild -exportArchive falhou (Xcode 26 bug conhecido). Tentando Payload zip…"

          if [ ! -f /tmp/export/*.ipa ]; then
            cd /tmp/FisioFlow.xcarchive/Products/Applications
            mkdir -p /tmp/Payload
            cp -R *.app /tmp/Payload/
            cd /tmp
            zip -r /tmp/FisioFlow.ipa Payload
            mkdir -p /tmp/export
            mv /tmp/FisioFlow.ipa /tmp/export/
          fi

      - name: Upload IPA artifact
        if: ${{ env.HAVE_SIGNING_SECRETS == 'true' }}
        uses: actions/upload-artifact@v4
        env:
          HAVE_SIGNING_SECRETS: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
        with:
          name: fisioflow-ios-ipa
          path: /tmp/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ startsWith(github.ref, 'refs/tags/mobile-v') && env.HAVE_API_KEY == 'true' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          HAVE_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/export/*.ipa \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID"

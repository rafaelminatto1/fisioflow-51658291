name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs2026/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs2026/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.33.0'
  # Default URLs for fallback; preferred via GitHub Variables
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}

jobs:
  # =====================================================================
  # LINT
  # =====================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint (web)
        run: pnpm --filter fisioflow-web lint

      - name: Lint (api)
        run: pnpm --filter @fisioflow/api lint

  # =====================================================================
  # TYPE CHECK
  # =====================================================================
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Type Check (web)
        run: pnpm --filter fisioflow-web type-check

      - name: Type Check (api)
        run: pnpm --filter @fisioflow/api type-check

  # =====================================================================
  # BUILD VERIFICATION
  # =====================================================================
  build:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build web
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_APP_ENV: production
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_NEON_AUTH_URL: ${{ env.VITE_NEON_AUTH_URL }}

  # =====================================================================
  # UNIT TESTS
  # =====================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Test (web)
        run: pnpm --filter fisioflow-web test:unit

      - name: Test (api)
        run: pnpm --filter @fisioflow/api test:unit

  # =====================================================================
  # NEON PREVIEW BRANCH (apenas em PRs)
  # =====================================================================
  neon-preview:
    name: Neon Preview Branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      db_url: ${{ steps.create-branch.outputs.db_url_with_pooler }}
    steps:
      - name: Create Neon Preview Branch
        id: create-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Verify Migrations (Dry Run)
        run: |
          echo "DATABASE_URL=${{ steps.create-branch.outputs.db_url_with_pooler }}" >> $GITHUB_ENV
          pnpm db:audit:schema
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

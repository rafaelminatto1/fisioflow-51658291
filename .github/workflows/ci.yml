name: CI / Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "docs2026/**"
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "docs2026/**"
      - "*.md"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API Worker"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_web:
        description: "Deploy Web Worker"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  deployments: write

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--max-old-space-size=8192"
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}
  VITE_NEON_DATA_API_URL: ${{ vars.VITE_NEON_DATA_API_URL || '' }}
  VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY || '' }}

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run predeploy gate
        run: bash scripts/predeploy-check.sh

      - name: Dependency audit advisory
        continue-on-error: true
        run: pnpm audit --audit-level high

  deploy-api:
    name: Deploy API Worker
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.deploy_api != 'false')
    needs: [quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production

  deploy-web:
    name: Deploy Web Worker
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.deploy_web != 'false')
    needs: [quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build web assets
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_APP_ENV: production
          GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_WORKERS_API_URL: ${{ env.VITE_WORKERS_API_URL }}
          VITE_NEON_AUTH_URL: ${{ env.VITE_NEON_AUTH_URL }}
          VITE_NEON_DATA_API_URL: ${{ env.VITE_NEON_DATA_API_URL }}
          VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY }}

      - name: Deploy Web
        run: pnpm --filter fisioflow-web exec wrangler deploy --config ../../wrangler.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  smoke-test:
    name: Production Smoke Test
    if: github.ref == 'refs/heads/main' && (always() && (needs['deploy-api'].result == 'success' || needs['deploy-web'].result == 'success'))
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run smoke checks
        run: pnpm smoke:production

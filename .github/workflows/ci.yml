name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  # =====================================================================
  # LINT & TYPE CHECK (Affected only)
  # =====================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Lint
        run: pnpm turbo run lint --filter="...[origin/main]"

      - name: Run Type Check
        run: pnpm turbo run type-check --filter="...[origin/main]"

  # =====================================================================
  # UNIT TESTS (Affected only)
  # =====================================================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Unit Tests
        run: pnpm turbo run test:unit --filter="...[origin/main]" -- --coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@4cea5370acc3ee29d59090c00808c440df702c2e # v4.4.3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # =====================================================================
  # BUILD (Always run build to ensure it works)
  # =====================================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build
        run: pnpm turbo run build --filter="...[origin/main]"
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload dist artifacts
        uses: actions/upload-artifact@4cea5370acc3ee29d59090c00808c440df702c2e # v4.4.3
        with:
          name: dist
          path: |
            dist/
            apps/*/dist/
            packages/*/dist/
          retention-days: 1

  # =====================================================================
  # E2E TESTS (Playwright Sharded)
  # =====================================================================
  test-e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Download dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d1c # v4.1.8
        with:
          name: dist
          path: dist

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Preview Server
        run: |
          npx -y http-server dist -p 4173 &
          sleep 5
          curl -s http://localhost:4173 > /dev/null

      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} --blob-report
        env:
          BASE_URL: http://localhost:4173

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@4cea5370acc3ee29d59090c00808c440df702c2e # v4.4.3
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # =====================================================================
  # MERGE E2E REPORTS
  # =====================================================================
  merge-reports:
    name: Merge E2E Reports
    needs: test-e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install: false

      - name: Download blob reports
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d1c # v4.1.8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@4cea5370acc3ee29d59090c00808c440df702c2e # v4.4.3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # =====================================================================
  # NEON DB PREVIEW (Only on PR) - DISABLED TEMPORARILY DUE TO GITHUB ACTIONS API ISSUES
  # =====================================================================
  neon-preview:
    name: Neon DB Preview
    if: false && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create Neon Branch
        id: create-branch
        uses: neondatabase/create-branch-action@646a51d9d970e7e1081b95b2909405be15f3334e # v6.0.3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Migrations
        run: pnpm db:push
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url_with_pooler }}

  # =====================================================================
  # LIGHTHOUSE CI
  # =====================================================================
  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Download dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d1c # v4.1.8
        with:
          name: dist
          path: dist

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@f62744655513d6a4c281358913b434458f338d38 # v12.1.0
        with:
          urls: |
            http://localhost:4173
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './.lighthouserc.json'
          serverBaseUrl: http://localhost:4173
          collectStartServerCommand: npx -y http-server dist -p 4173

name: CI / Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs2026/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'docs2026/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}
  VITE_NEON_DATA_API_URL: ${{ vars.VITE_NEON_DATA_API_URL || '' }}
  VITE_SCHEDULE_CALENDAR: ${{ vars.VITE_SCHEDULE_CALENDAR || 'fullcalendar' }}

# ──────────────────────────────────────────────
# CI JOBS  (run on every push and every PR)
# ──────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - run: pnpm --filter fisioflow-web lint
      - run: pnpm --filter @fisioflow/api lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - run: pnpm --filter fisioflow-web type-check
      - run: pnpm --filter @fisioflow/api type-check

  build:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Build
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_APP_ENV: production
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_WORKERS_API_URL: ${{ env.VITE_WORKERS_API_URL }}
          VITE_NEON_AUTH_URL: ${{ env.VITE_NEON_AUTH_URL }}
          VITE_NEON_DATA_API_URL: ${{ env.VITE_NEON_DATA_API_URL }}
          VITE_SCHEDULE_CALENDAR: ${{ env.VITE_SCHEDULE_CALENDAR }}

  test-api:
    name: Test API (Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - run: pnpm --filter @fisioflow/api test:unit

# ──────────────────────────────────────────────
# DEPLOY JOBS  (only on push to main, needs all CI jobs green)
# ──────────────────────────────────────────────
  deploy-api:
    name: Deploy API (Workers)
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [lint, type-check, build, test-api]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production

  deploy-web:
    name: Deploy Web
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [lint, type-check, build, test-api]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Build
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_APP_ENV: production
          GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
          VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
          VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}
          VITE_NEON_DATA_API_URL: ${{ vars.VITE_NEON_DATA_API_URL || '' }}
          VITE_SCHEDULE_CALENDAR: ${{ vars.VITE_SCHEDULE_CALENDAR || 'fullcalendar' }}
          VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY }}
      - name: Deploy Web Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production

  smoke-test:
    name: Production Smoke Test
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Smoke Test
        run: |
          pnpm exec playwright test e2e/production-health.spec.ts
        env:
          TEST_BASE_URL: https://www.moocafisio.com.br
          TEST_USER_EMAIL: ${{ secrets.PROD_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PROD_TEST_USER_PASSWORD }}

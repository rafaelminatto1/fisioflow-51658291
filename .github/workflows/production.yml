name: Production Deploy

# main = fonte de verdade do que está live. Todo push em main que toque
# runtime (apps/web, apps/api, src, packages, configs, lockfile) dispara um
# deploy de produção, atrás de um quality gate e seguido de smoke test.
# Também acionável manualmente (workflow_dispatch) para re-deploy/rollback.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "src/**"
      - "packages/**"
      - "functions/**"
      - "wrangler.toml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/production.yml"
  workflow_dispatch:

permissions:
  contents: read

# Nunca rodar dois deploys de produção ao mesmo tempo; enfileira em vez de
# cancelar (cancelar no meio de um wrangler deploy deixaria estado parcial).
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.0.9"
  NODE_OPTIONS: "--max-old-space-size=8192"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # lint + type-check (web/api) + testes unitários da api + build web
      - name: Run predeploy gate
        run: bash scripts/predeploy-check.sh

  deploy:
    name: Deploy Production
    needs: [quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # wrangler lê CLOUDFLARE_* do ambiente; os secrets do repo se chamam CF_*.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # 1. API primeiro: se o web novo depender de contrato novo da API,
      #    a API já está no ar quando o web sobe.
      - name: Dry-run API deploy
        run: pnpm --dir apps/api exec wrangler deploy --dry-run --env production

      # Retry: o registro dos 12 Workflow triggers via API do Cloudflare é
      # intermitentemente instável (falha "Some triggers failed to deploy" mesmo
      # com o Worker já enviado). O `wrangler deploy` é idempotente (re-envia +
      # re-registra), então re-tentar com backoff limpa o soluço transitório em
      # vez de derrubar o deploy inteiro (e, com ele, o deploy do web abaixo).
      - name: Deploy API (fisioflow-api)
        run: |
          for attempt in 1 2 3 4 5; do
            echo "::group::Deploy API — tentativa $attempt/5"
            if pnpm --dir apps/api exec wrangler deploy --env production; then
              echo "::endgroup::"
              echo "Deploy API OK na tentativa $attempt/5"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Deploy API falhou na tentativa $attempt/5 (provável flakiness da API de triggers de Workflows do Cloudflare)"
            if [ "$attempt" -lt 5 ]; then sleep $((attempt * 15)); fi
          done
          echo "::error::Deploy API falhou após 5 tentativas"
          exit 1

      # 2. Build do web com env de produção. .env.production é gitignored, então
      #    as VITE_* vêm daqui. VITE_NEON_AUTH_URL é DELIBERADAMENTE omitida para
      #    ativar o proxy same-origin /__neon-auth (cutover do #113).
      - name: Build web assets
        run: pnpm --filter fisioflow-web build
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_ENVIRONMENT: production
          VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://fisioflow-api.rafalegollas.workers.dev' }}
          VITE_STREAM_UPLOAD_ENABLED: ${{ vars.VITE_STREAM_UPLOAD_ENABLED || 'true' }}
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY || 'phc_PlsGl8lTtG4ipbfRBxXfyh5TWKGdSTNXu0LDm5aK9WT' }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST || 'https://us.i.posthog.com' }}
          VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY || '' }}

      - name: Deploy web (fisioflow-web)
        run: |
          for attempt in 1 2 3; do
            echo "::group::Deploy web — tentativa $attempt/3"
            if pnpm --dir apps/api exec wrangler deploy --config ../../wrangler.toml --env production; then
              echo "::endgroup::"
              echo "Deploy web OK na tentativa $attempt/3"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Deploy web falhou na tentativa $attempt/3"
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 10)); fi
          done
          echo "::error::Deploy web falhou após 3 tentativas"
          exit 1

  smoke-test:
    name: Smoke Test
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install: "false"

      - name: Run production smoke checks
        run: pnpm smoke:production

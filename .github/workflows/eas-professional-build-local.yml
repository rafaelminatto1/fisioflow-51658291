name: iOS Build Local — Professional App

# Build iOS no runner macos-26 (Apple Silicon / Xcode 26.2) usando eas build --local.
# Não consome quota de builds do EAS cloud.
#
# Por que macos-26?
#   • Xcode 26.2 é o default — obrigatório para Expo SDK 55 / RN 0.83
#   • Runner Apple Silicon (arm64) = compilação nativa rápida
#   • macos-14 (Xcode 15.4) é incompatível com SDK 55 e será descontinuado em nov/2026
#
# Triggers:
#   1. workflow_dispatch — disparo manual com escolha de perfil
#   2. push em main com mudanças no professional-app

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil de build"
        type: choice
        options:
          - preview
          - testflight
          - production
        default: preview
  push:
    branches: [main]
    paths:
      - "apps/professional-app/**"
      - ".github/workflows/eas-professional-build-local.yml"

concurrency:
  group: ios-local-pro-${{ github.ref }}-${{ inputs.profile || 'preview' }}
  cancel-in-progress: true

env:
  PROFILE: ${{ inputs.profile || 'preview' }}
  EXPO_USE_SYMLINKS: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-ios:
    name: iOS ${{ inputs.profile || 'preview' }} (macos-26 / Xcode 26.2)
    runs-on: macos-26        # Apple Silicon arm64 — Xcode 26.2 default, obrigatório para SDK 55
    timeout-minutes: 90

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Ambiente ────────────────────────────────────────────────────────────
      - name: Versões do ambiente
        run: |
          xcodebuild -version
          pod --version
          sw_vers

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # ─── Cache pnpm store ─────────────────────────────────────────────────────
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      # ─── Dependências ─────────────────────────────────────────────────────────
      - name: Instalar dependências (pnpm)
        run: pnpm install --frozen-lockfile

      # ─── EAS CLI ──────────────────────────────────────────────────────────────
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ─── Build local iOS ──────────────────────────────────────────────────────
      - name: Build iOS local (eas build --local)
        working-directory: apps/professional-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Perfil: $PROFILE"
          echo "Xcode: $(xcodebuild -version | head -1)"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output "${{ github.workspace }}/build.ipa"

      # ─── Artefato ─────────────────────────────────────────────────────────────
      - name: Upload .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fisioflow-pro-${{ env.PROFILE }}-${{ github.run_number }}
          path: build.ipa
          retention-days: 14

      # ─── TestFlight ───────────────────────────────────────────────────────────
      - name: Submeter ao TestFlight
        if: ${{ success() && (env.PROFILE == 'testflight' || env.PROFILE == 'production') }}
        working-directory: apps/professional-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform ios \
            --non-interactive \
            --path "${{ github.workspace }}/build.ipa"

      # ─── Resumo ───────────────────────────────────────────────────────────────
      - name: Resumo
        if: always()
        run: |
          echo ""
          echo "========================================================"
          echo "  iOS LOCAL BUILD — FisioFlow Pro"
          echo "  Perfil  : $PROFILE"
          echo "  Runner  : ${{ runner.os }} ${{ runner.arch }} (macos-26 / Xcode 26.2)"
          echo "  Expo    : SDK 55"
          echo "  Commit  : ${{ github.sha }}"
          if [ -f "${{ github.workspace }}/build.ipa" ]; then
            SIZE=$(du -sh "${{ github.workspace }}/build.ipa" | cut -f1)
            echo "  .ipa    : $SIZE ✅"
            echo "  Artefato disponível em: Actions → Artifacts"
          else
            echo "  .ipa    : NÃO GERADO ❌ — ver logs acima"
          fi
          echo "========================================================"

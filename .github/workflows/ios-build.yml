name: iOS Build (sem EAS)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App a buildar'
        required: true
        default: 'patient-app'
        type: choice
        options:
          - patient-app
          - professional-app
      profile:
        description: 'Perfil de distribuição'
        required: true
        default: 'development'
        type: choice
        options:
          - development   # Ad-hoc — instala direto no device registrado
          - preview       # Ad-hoc — mesma coisa, build release

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.1'

jobs:
  build-ios:
    name: Build iOS — ${{ inputs.app }} (${{ inputs.profile }})
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node + pnpm ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 2b. Skia prebuilt binaries (professional-app only) ────────────────
      - name: Download Skia binaries
        if: inputs.app == 'professional-app'
        working-directory: apps/professional-app
        run: node node_modules/@shopify/react-native-skia/scripts/install-skia.mjs

      # ── 3. Expo Prebuild ───────────────────────────────────────────────────
      - name: Expo Prebuild (gera /ios nativa)
        working-directory: apps/${{ inputs.app }}
        run: npx expo prebuild --platform ios --clean --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 4. Cache CocoaPods (economiza ~10 min) ────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/${{ inputs.app }}/ios/Pods
          key: pods-${{ inputs.app }}-${{ hashFiles(format('apps/{0}/ios/Podfile.lock', inputs.app)) }}
          restore-keys: pods-${{ inputs.app }}-

      - name: Pod install
        working-directory: apps/${{ inputs.app }}/ios
        run: pod install --repo-update

      # ── 5. Importar certificado Apple (.p12) ──────────────────────────────
      - name: Importar certificado p12
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── 6. Importar Provisioning Profile (selecionado por app) ───────────────
      - name: Importar provisioning profile (patient-app)
        if: inputs.app == 'patient-app'
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_PACIENTES_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Importar provisioning profile (professional-app)
        if: inputs.app == 'professional-app'
        env:
          PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_PROFISSIONAIS_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. xcodebuild archive ─────────────────────────────────────────────
      - name: Build & Archive
        working-directory: apps/${{ inputs.app }}/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ inputs.app == 'patient-app' && secrets.APPLE_PROVISIONING_PROFILE_PACIENTES_NAME || secrets.APPLE_PROVISIONING_PROFILE_PROFISSIONAIS_NAME }}
        run: |
          SCHEME=$(ls *.xcworkspace | head -1 | sed 's/.xcworkspace//')
          echo "Scheme detectado: $SCHEME"

          xcodebuild \
            -workspace "$SCHEME.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            | xcpretty --color || true

      # ── 8. Exportar IPA ───────────────────────────────────────────────────
      - name: Exportar IPA (ad-hoc)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      # ── 9. Upload do artefato ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ inputs.app }}-${{ inputs.profile }}-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      # ── 10. Limpar keychain ───────────────────────────────────────────────
      - name: Limpar keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app.keychain-db" || true

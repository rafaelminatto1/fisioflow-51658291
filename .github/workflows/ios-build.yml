name: iOS Build (sem EAS)

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App a buildar'
        required: true
        default: 'patient-app'
        type: choice
        options:
          - patient-app
          - professional-app
      profile:
        description: 'Perfil de distribuição'
        required: true
        default: 'development'
        type: choice
        options:
          - development   # Ad-hoc — instala direto no device registrado
          - preview       # Ad-hoc — mesma coisa, build release

env:
  NODE_VERSION: '22'
  # Usa Node.js 24 nos GitHub Actions (Node 20 deprecated a partir de Jun/2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-ios:
    name: Build iOS — ${{ inputs.app }} (${{ inputs.profile }})
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      # ── 2. Node + pnpm ────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 3. Expo Prebuild ───────────────────────────────────────────────────
      - name: Expo Prebuild (gera /ios nativa)
        working-directory: apps/${{ inputs.app }}
        run: npx expo prebuild --platform ios --clean --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets['EXPO_TOKEN'] }}

      # ── 4. Cache CocoaPods (economiza ~10 min) ────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/${{ inputs.app }}/ios/Pods
          key: pods-v4-${{ inputs.app }}-${{ hashFiles(format('apps/{0}/ios/Podfile.lock', inputs.app)) }}
          restore-keys: pods-v4-${{ inputs.app }}-

      - name: Pod install
        working-directory: apps/${{ inputs.app }}/ios
        run: pod install --repo-update

      # ── 5. Importar certificado Apple (.p12) ──────────────────────────────
      - name: Importar certificado p12
        env:
          CERTIFICATE_BASE64: ${{ secrets['APPLE_CERTIFICATE_P12_BASE64'] }}
          CERTIFICATE_PASSWORD: ${{ secrets['APPLE_CERTIFICATE_PASSWORD'] }}
          KEYCHAIN_PASSWORD: ${{ secrets['KEYCHAIN_PASSWORD'] }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── 6. Importar Provisioning Profile — extrai UUID e copia com nome correto
      - name: Importar provisioning profile
        env:
          PROFILE_BASE64_PACIENTES: ${{ secrets['APPLE_PROVISIONING_PROFILE_PACIENTES_BASE64'] }}
          PROFILE_BASE64_PROFISSIONAIS: ${{ secrets['APPLE_PROVISIONING_PROFILE_PROFISSIONAIS_BASE64'] }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision

          # Seleciona o base64 correto para o app
          if [ "${{ inputs.app }}" = "patient-app" ]; then
            echo -n "$PROFILE_BASE64_PACIENTES" | base64 --decode -o "$PROFILE_PATH"
          else
            echo -n "$PROFILE_BASE64_PROFISSIONAIS" | base64 --decode -o "$PROFILE_PATH"
          fi

          # Extrai UUID do perfil (Xcode indexa por UUID, não por nome)
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null \
            | plutil -extract UUID raw - 2>/dev/null)

          if [ -z "$PROFILE_UUID" ]; then
            echo "ERRO: não foi possível extrair UUID do perfil"
            security cms -D -i "$PROFILE_PATH" 2>&1 | head -30
            exit 1
          fi

          echo "Profile UUID: $PROFILE_UUID"

          # Copia com o nome {UUID}.mobileprovision (padrão do Xcode)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID.mobileprovision"

          echo "=== Perfis instalados ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

          # Salva UUID para o step de build
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 7. xcodebuild archive ─────────────────────────────────────────────
      - name: Detectar workspace e schemes disponíveis
        working-directory: apps/${{ inputs.app }}/ios
        run: |
          echo "=== Estrutura do diretório iOS ==="
          ls -la
          WORKSPACE=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "ERRO: Nenhum .xcworkspace no diretório iOS"
            exit 1
          fi
          SCHEME=$(echo "$WORKSPACE" | sed 's/\.xcworkspace//')
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"
          echo "=== Schemes disponíveis ==="
          xcodebuild -workspace "$WORKSPACE" -list 2>&1 | grep -A20 "Schemes:" || true

      - name: Build & Archive
        working-directory: apps/${{ inputs.app }}/ios
        env:
          APPLE_TEAM_ID: ${{ secrets['APPLE_TEAM_ID'] }}
          # Desabilita upload automático do Sentry (sem credenciais configuradas no CI)
          # Evita que collect-modules.sh falhe com exit 1 por source map ausente
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
        run: |
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/\.xcworkspace//')
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME | UUID: $PROFILE_UUID"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/app.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            SKIP_INSTALL=NO

      # ── 8. Empacotar IPA manualmente ─────────────────────────────────────
      # xcodebuild -exportArchive falha no Xcode 26 com "Unknown Distribution Error"
      # para perfis ad-hoc. O .app já está assinado pelo archive — basta zipar.
      - name: Empacotar IPA (Payload zip)
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/app.xcarchive/Products" -name "*.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: Nenhum .app encontrado no archive"
            find "$RUNNER_TEMP/app.xcarchive" -type d | head -20
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH" .app)
          echo "App encontrado: $APP_PATH"

          IPA_STAGE="$RUNNER_TEMP/ipa-stage"
          mkdir -p "$IPA_STAGE/Payload"
          cp -r "$APP_PATH" "$IPA_STAGE/Payload/"

          IPA_OUT="$RUNNER_TEMP/ipa"
          mkdir -p "$IPA_OUT"
          (cd "$IPA_STAGE" && zip -qr "$IPA_OUT/${APP_NAME}.ipa" Payload/)
          echo "IPA gerado: $IPA_OUT/${APP_NAME}.ipa"
          ls -lh "$IPA_OUT/"

      # ── 9. Upload do artefato ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ inputs.app }}-${{ inputs.profile }}-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      # ── 10. Limpar keychain ───────────────────────────────────────────────
      - name: Limpar keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app.keychain-db" || true

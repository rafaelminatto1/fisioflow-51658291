name: Security Audit and Quality Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 0 * * 1" # Toda segunda-feira à meia-noite

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Security Audit
        run: pnpm audit
        continue-on-error: true # Notifica mas não bloqueia se forem vulnerabilidades moderadas/baixas

      - name: Lint Check
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

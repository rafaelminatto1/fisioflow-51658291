name: Deploy — Cloudflare Pages + Workers

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===== 1. TYPE CHECK =====
  type-check:
    name: Type Check (Workers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check Workers
        run: pnpm workers:type-check

  # ===== 2. DEPLOY WORKER =====
  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: type-check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://fisioflow-api.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy

  # ===== 3. DEPLOY FRONTEND (Cloudflare Pages) =====
  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: type-check
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://fisioflow.pages.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          VITE_APP_ENV: production
          VITE_API_BASE_URL: https://fisioflow-api.workers.dev/api

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fisioflow --commit-dirty=true

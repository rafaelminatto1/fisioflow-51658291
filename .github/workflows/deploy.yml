name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  # Default URLs for fallback; preferred via GitHub Variables
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-pro.moocafisio.com.br/api' }}
  VITE_WORKERS_API_URL: ${{ vars.VITE_WORKERS_API_URL || 'https://api-pro.moocafisio.com.br' }}
  VITE_NEON_AUTH_URL: ${{ vars.VITE_NEON_AUTH_URL || 'https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth' }}
  VITE_NEON_DATA_API_URL: ${{ vars.VITE_NEON_DATA_API_URL }}

jobs:
  # =====================================================================
  # DEPLOY API — Cloudflare Workers (apps/api)
  # =====================================================================
  deploy-api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production

  # =====================================================================
  # DEPLOY WEB — Build + Cloudflare Worker com Assets (root wrangler.toml)
  # =====================================================================
  deploy-web:
    name: Deploy Web (fisioflow-web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build web
        run: pnpm --filter fisioflow-web build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_APP_ENV: production
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_WORKERS_API_URL: ${{ env.VITE_WORKERS_API_URL }}
          VITE_NEON_AUTH_URL: ${{ env.VITE_NEON_AUTH_URL }}
          VITE_NEON_DATA_API_URL: ${{ env.VITE_NEON_DATA_API_URL }}
          VITE_GOOGLE_AI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GOOGLE_AI_API_KEY }}

      - name: Deploy Web Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy

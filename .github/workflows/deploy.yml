name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # =====================================================================
  # PRODUCTION DATABASE MIGRATIONS
  # =====================================================================
  migrate-db:
    name: Database Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run Migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # =====================================================================
  # DEPLOY WORKERS
  # =====================================================================
  deploy-workers:
    name: Deploy Cloudflare Workers
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Deploy Workers
        uses: cloudflare/wrangler-action@39209594f86d8a7c06283b27b3706093d56715b5 # v3.14.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy

  # =====================================================================
  # DEPLOY PAGES
  # =====================================================================
  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Frontend
        run: pnpm turbo run build --filter="fisioflow-web"
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_APP_ENV: production
          VITE_API_BASE_URL: https://fisioflow-api.workers.dev/api

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@39209594f86d8a7c06283b27b3706093d56715b5 # v3.14.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=fisioflow --commit-dirty=true

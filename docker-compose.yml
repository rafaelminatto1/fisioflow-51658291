version: "3.8"

services:
  orthanc:
    image: jodogne/orthanc-plugins
    container_name: fisioflow-orthanc
    restart: unless-stopped
    ports:
      - "8042:8042" # HTTP port (expose to host for dev/proxy)
      - "4242:4242" # DICOM port
    environment:
      ORTHANC_NAME: "FISIOFLOW_ORTHANC"
      ORTHANC__PLUGINS__ENABLED: "true"
      # Autenticacao habilitada — credenciais via secrets (ver README)
      ORTHANC__AUTHENTICATION_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
    secrets:
      - orthanc_username
      - orthanc_password
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
    networks:
      - dicom-net

volumes:
  orthanc-storage:

secrets:
  orthanc_username:
    file: ./secrets/orthanc_username.txt
  orthanc_password:
    file: ./secrets/orthanc_password.txt

networks:
  dicom-net:

packages:
  - "apps/*"
  - "!apps/mobile-ios"
  - "packages/*"
  - "functions"

nodeLinker: hoisted

allowBuilds:
  "@google/genai": true
  "@scarf/scarf": true
  "@sentry-internal/node-cpu-profiler": true
  "@sentry/cli": true
  "@tree-sitter-grammars/tree-sitter-yaml": true
  "core-js": true
  "core-js-pure": true
  "esbuild": true
  "msw": true
  "protobufjs": true
  "puppeteer": true
  "sharp": true
  "tree-sitter": true
  "tree-sitter-json": true
  "workerd": true

overrides:
  react: 19.2.0
  react-dom: 19.2.0
  "@types/react": "^19.0.0"
  better-auth: "^1.6.10"
  axios: "^1.15.0"
  dompurify: "^3.4.0"
  lodash: "^4.18.0"
  lodash-es: "^4.18.0"
  hono: "^4.12.14"
  postcss: "^8.5.10"
  handlebars: "^4.7.9"
  protobufjs: "^7.5.5"
  basic-ftp: "^5.2.0"
  uuid: "^14.0.0"
  next: "^16.1.7"
  fastify: "^5.8.3"
  picomatch: "^4.0.4"
  path-to-regexp: "^8.4.0"
  rollup: "^4.59.0"
  minimatch: "^3.1.4"
  serialize-javascript: "^7.0.5"
  esbuild: "^0.25.0"
  "@xmldom/xmldom": "^0.8.13"
  ajv: "^8.18.0"
  immutable: "^3.8.3"
  svelte: "^5.53.5"
  expo-modules-core: 55.0.25
  expo-constants: 55.0.16
  expo-keep-awake: 55.0.8

peerDependencyRules:
  ignoreMissing:
    - typescript
    - vite
    - eslint
    - vitest
    - "@vitest/browser"
    - "@better-auth/core"
    - "@better-auth/utils"
    - "better-call"
    - "@expo/dom-webview"
    - "@types/emscripten"
    - "@testing-library/react-native"
    - "@vitejs/plugin-rsc"
    - "react-server-dom-webpack"
    - "@typescript-eslint/parser"
    - "storybook"
    - "pg"
  allowedVersions:
    typescript: ">=5.0.0"
    vite: ">=5.0.0"
    eslint: ">=9.0.0"
    tailwindcss: ">=3.0.0"
    "@tiptap/core": ">=3.0.0"
    "@tiptap/pm": ">=3.0.0"
    "wrangler": ">=4.88.0"
    "@cloudflare/workers-types": ">=4.0.0"
    "react": ">=18.0.0"
    "react-dom": ">=18.0.0"
    "drizzle-orm": ">=0.45.0"
    "pg": ">=0.0.0"
    "@better-auth/core": ">=1.5.0"
    "@better-auth/utils": ">=0.3.0"
    "better-call": ">=1.3.0"
    "@expo/dom-webview": ">=55.0.0"
    "@types/emscripten": ">=0.0.0"
    "@testing-library/react-native": ">=12.0.0"
    "@vitejs/plugin-rsc": ">=0.5.0"
    "react-server-dom-webpack": ">=18.0.0"
    "@typescript-eslint/parser": ">=8.0.0"
    "storybook": ">=8.0.0"

patchedDependencies:
  "expo-modules-core@55.0.25": "apps/professional-app/patches/expo-modules-core@55.0.25.patch"

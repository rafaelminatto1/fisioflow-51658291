# FisioFlow Web - Frontend via Workers Assets (NOT Cloudflare Pages)
# Deploy: wrangler deploy --env production  (nunca usar "wrangler pages deploy")
name = "fisioflow-web"
main = "apps/web/src/asset-worker.ts"
compatibility_date = "2026-06-06"
assets = { directory = "./apps/web/dist", binding = "ASSETS" }

[observability]
enabled = true

# Custom domain routes — ensures the Worker handles all traffic for moocafisio.com.br
routes = [
  { pattern = "www.moocafisio.com.br", custom_domain = true },
  { pattern = "moocafisio.com.br", custom_domain = true },
]

# Staging Environment
[env.staging]
name = "fisioflow-web-staging"
assets = { directory = "./apps/web/dist", binding = "ASSETS" }

# Production Environment
[env.production]
name = "fisioflow-web"
assets = { directory = "./apps/web/dist", binding = "ASSETS" }
routes = [
  { pattern = "www.moocafisio.com.br", custom_domain = true },
  { pattern = "moocafisio.com.br", custom_domain = true },
]

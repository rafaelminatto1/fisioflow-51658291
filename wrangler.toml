# FisioFlow Web - Frontend Assets Worker
name = "fisioflow-web"
main = "apps/web/src/asset-worker.ts"
compatibility_date = "2026-03-25"
assets = { directory = "./apps/web/dist", binding = "ASSETS", not_found_handling = "single-page-application" }

[observability]
enabled = true

# Staging Environment
[env.staging]
name = "fisioflow-web-staging"
assets = { directory = "./apps/web/dist", binding = "ASSETS", not_found_handling = "single-page-application" }

# Production Environment
[env.production]
name = "fisioflow-web"
assets = { directory = "./apps/web/dist", binding = "ASSETS", not_found_handling = "single-page-application" }

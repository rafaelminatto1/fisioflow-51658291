# FisioFlow Web - Frontend Assets Worker
name = "fisioflow-web"
compatibility_date = "2026-03-25"
assets = { directory = "./apps/web/dist", not_found_handling = "single-page-application" }

[placement]
mode = "smart"

[observability]
enabled = true

# Staging Environment
[env.staging]
name = "fisioflow-web-staging"
assets = { directory = "./apps/web/dist", not_found_handling = "single-page-application" }

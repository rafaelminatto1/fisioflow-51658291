<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Versão da aplicação para controle de cache -->
  <meta name="app-version" content="%APP_VERSION%" />
  <meta name="build-time" content="%BUILD_TIME%" />

  <!-- Cache Control - Previne cache agressivo do navegador -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>FisioFlow - Sistema de Gestão para Clínicas de Fisioterapia</title>
  <meta name="description"
    content="Sistema completo de gestão para clínicas de fisioterapia com dashboard, agendamentos, pacientes e relatórios" />
  <meta name="author" content="FisioFlow" />
  <meta name="keywords" content="fisioterapia, clínica, gestão, agendamento, pacientes, sistema médico" />

  <!-- Google Fonts Preconnect (Optional for other fallback fonts if needed) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Typography (Inter from Google Fonts) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <!-- Otimização de Carregamento (Hints para o Cloudflare Early Hints) -->

  <link rel="prefetch" href="/favicon.svg" as="image">
  <link rel="prefetch" href="/manifest.json" as="fetch">

  <!-- PWA Configuration -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="background-color" content="#ffffff" />
  <meta name="display" content="standalone" />
  <meta name="orientation" content="portrait" />

  <!-- PWA Configuration for Mobile -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="FisioFlow" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.avif" />

  <!-- Favicon (SVG for modern browsers, AVIF fallback for newer browsers) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/avif" sizes="32x32" href="/favicon-32x32.avif" />
  <link rel="icon" type="image/avif" sizes="16x16" href="/favicon-16x16.avif" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta property="og:title" content="FisioFlow - Gestão Inteligente para Fisioterapia" />
  <meta property="og:description"
    content="Plataforma líder em gestão de clínicas: agendamento inteligente, prontuário digital e IA para reabilitação." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fisioflow.com.br" />
  <meta property="og:site_name" content="FisioFlow" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.avif" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@lovable_dev" />
  <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.avif" />
</head>

<body>
  <div id="root">
    <style>
      :root {
        --primary-h: 199;
        --primary-s: 89%;
        --primary-l: 48%;
        --primary: hsl(var(--primary-h), var(--primary-s), var(--primary-l));
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;
        }
      }

      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: hsl(var(--background));
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      }

      .loader-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, 
          hsla(var(--primary-h), var(--primary-s), var(--primary-l), 0.15) 0%, 
          hsla(var(--primary-h), var(--primary-s), var(--primary-l), 0.05) 100%
        );
        border-radius: 16px;
        position: relative;
        margin-bottom: 24px;
        box-shadow: 
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 
          0 2px 4px -1px rgba(0, 0, 0, 0.06),
          inset 0 0 0 1px hsla(var(--primary-h), var(--primary-s), var(--primary-l), 0.1);
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--primary);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        position: absolute;
        top: 50%;
        left: 50%;
        margin-top: -16px;
        margin-left: -16px;
        filter: drop-shadow(0 2px 4px rgba(var(--primary-h), var(--primary-s), var(--primary-l), 0.2));
      }

      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation: none;
          border-top-color: var(--primary);
          opacity: 0.5;
        }
      }

      .loader-text {
        color: hsl(var(--foreground));
        font-weight: 500;
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .loader-subtext {
        color: hsla(215, 16%, 47%, 1);
        font-size: 0.875rem;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .progress-bar {
        width: 100%;
        max-width: 320px;
        height: 4px;
        background-color: hsla(210, 40%, 96%, 1);
        border-radius: 9999px;
        overflow: hidden;
        margin-top: 24px;
      }

      @media (prefers-color-scheme: dark) {
        .progress-bar {
          background-color: hsla(217, 33%, 17%, 1);
        }
        .loader-subtext {
          color: hsla(215, 20%, 65%, 1);
        }
      }

      .progress-value {
        width: 60%;
        height: 100%;
        background-color: var(--primary);
        border-radius: 9999px;
        animation: loading-progress 2s ease-in-out infinite;
      }

      @keyframes loading-progress {
        0% {
          transform: translateX(-100%) scaleX(0.2);
        }

        50% {
          transform: translateX(0) scaleX(0.6);
        }

        100% {
          transform: translateX(400%) scaleX(0.2);
        }
      }
    </style>
    <div id="initial-loader" aria-busy="true" aria-live="polite" role="status">
      <div class="loader-icon" aria-hidden="true">
        <div class="spinner"></div>
      </div>
      <div class="loader-text" id="loader-joke">Carregando sistema...</div>
      <div class="loader-subtext">Preparando sua reabilitação digital</div>
      <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso de carregamento">
        <div class="progress-value"></div>
      </div>
    </div>
  </div>
   <!-- Expor versão globalmente para cache busting -->
   <script>
     // Polyfill para __DEFINES__ (usado por algumas bibliotecas de terceiros)
     if (typeof window.__DEFINES__ === 'undefined') {
       window.__DEFINES__ = {};
     }

     window.__APP_VERSION__ = "%APP_VERSION%";
     window.__BUILD_TIME__ = "%BUILD_TIME%";
     window.__CACHE_BUSTER__ = window.__BUILD_TIME__ || Date.now().toString();

    const jokes = [
      "Carregando... alongando a verdade um pouquinho.",
      "Resistência não é fútil, é fisioterapia!",
      "Trabalhando na sua postura... digo, no seu sistema.",
      "Aguarde, estamos fortalecendo os pixels.",
      "Quase lá! Só mais uma série de 10 segundos.",
      "Gelo ou calor? Enquanto você decide, nós carregamos.",
      "Inspirar... Expirar... Carregar...",
      "Mobilizando as articulações do banco de dados."
    ];
    
    let jokeIndex = 0;
    const jokeElement = document.getElementById('loader-joke');
    if (jokeElement) {
      jokeElement.innerText = jokes[0];
      setInterval(() => {
        jokeIndex = (jokeIndex + 1) % jokes.length;
        jokeElement.innerText = jokes[jokeIndex];
      }, 3000);
    }

    // Limpar storage se a versão mudar drasticamente (ex: após 24h)
    const lastVersion = localStorage.getItem('app_version');
    const currentVersion = window.__APP_VERSION__;

    if (lastVersion && lastVersion !== currentVersion) {
      console.log('[Cache] Versão alterada, limpando caches...');
      // Limpar caches que podem causar problemas
      sessionStorage.clear();
      // Não limpar localStorage completamente para preservar preferências
    }

    localStorage.setItem('app_version', currentVersion);
    localStorage.setItem('last_build_time', window.__BUILD_TIME__);
  </script>

  <!-- MediaPipe CDN (Defered to avoid blocking initial render) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous" defer></script>

	<script type="module" src="../../src/main.tsx"></script>
	<script type="module" src="/@vite/client"></script>
</body>

</html>

name = "fisioflow-api"
main = "src/index.ts"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[placement]
mode = "smart"

# ===== ROTAS (SUBDOMINIOS CUSTOMIZADOS) =====
routes = [
  { pattern = "api-pro.moocafisio.com.br", custom_domain = true },
  { pattern = "api-paciente.moocafisio.com.br", custom_domain = true },
]


# ===== HYPERDRIVE (Neon PostgreSQL) =====
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "12b9fefcfbc04074a63342a9212e1b4f"

# ===== CLOUDFLARE R2 (Media Storage) =====
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media"

[[r2_buckets]]
binding = "EXAMS_BUCKET"
bucket_name = "fisioflow-exams"

[[r2_buckets]]
binding = "CLINICAL_DOCS_BUCKET"
bucket_name = "fisioflow-clinical-docs"

# ===== STREAM =====
[stream]
binding = "STREAM"

# ===== KV NAMESPACES =====
[[kv_namespaces]]
binding = "FISIOFLOW_CONFIG"
id = "4284b33fa7ed40b6bc9c59b6041c03ed"

# ===== D1 SQL =====
[[d1_databases]]
binding = "DB"
database_name = "fisioflow-db"
database_id = "bf781be2-527d-471d-9cf2-dd18f8e6c2b2"

[[d1_databases]]
binding = "EDGE_CACHE"
database_name = "fisioflow-edge-cache"
database_id = "9eba3eb7-5486-49d0-9684-c325f8b1ddc2"

# ===== ANALYTICS ENGINE =====
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "fisioflow_events"

# ===== AI SEARCH =====
# A instancia fisioflow-rag deve ser criada como `wrangler ai-search create fisioflow-rag --type builtin`.
# Nao apontar para o bucket R2 fisioflow-media: o crawler tenta indexar midia clinica e gera erros.
[[ai_search]]
binding = "AI_SEARCH"
instance_name = "fisioflow-rag"

# Instância isolada do assistente do paciente (só conteúdo patient_visible)
[[ai_search]]
binding = "AI_SEARCH_PATIENT"
instance_name = "fisioflow-rag-paciente"

# ===== AGENT MEMORY (PRIVATE BETA) =====
# Conta ainda nao liberada no beta: wrangler retorna Not allowed [10018].
# Quando a Cloudflare habilitar, criar `fisioflow-memory` e descomentar.
# [[agent_memory]]
# binding = "AGENT_MEMORY"
# namespace = "fisioflow-memory"

# ===== PIPELINES =====
[[pipelines]]
binding = "EVENTS_PIPELINE"
pipeline = "701aff68d26e4c45a29f090389bcd4f2"

# ===== WORKFLOWS =====
[[workflows]]
name = "appointment-reminder"
binding = "WORKFLOW_APPOINTMENT_REMINDER"
class_name = "AppointmentReminderWorkflow"

[[workflows]]
name = "patient-onboarding"
binding = "WORKFLOW_PATIENT_ONBOARDING"
class_name = "PatientOnboardingWorkflow"

[[workflows]]
name = "nfse-emission"
binding = "WORKFLOW_NFSE"
class_name = "NFSeWorkflow"

[[workflows]]
name = "hep-compliance"
binding = "WORKFLOW_HEP_COMPLIANCE"
class_name = "HEPComplianceWorkflow"

[[workflows]]
name = "patient-discharge"
binding = "WORKFLOW_DISCHARGE"
class_name = "PatientDischargeWorkflow"

[[workflows]]
name = "patient-reengagement"
binding = "WORKFLOW_REENGAGEMENT"
class_name = "PatientReengagementWorkflow"

[[workflows]]
name = "patient-digital-twin"
binding = "WORKFLOW_DIGITAL_TWIN"
class_name = "PatientDigitalTwinWorkflow"

[[workflows]]
name = "wiki-sync"
binding = "WORKFLOW_WIKI_SYNC"
class_name = "WikiSyncWorkflow"
schedules = ["0 9 * * *"]

[[workflows]]
name = "knowledge-sync"
binding = "WORKFLOW_KNOWLEDGE_SYNC"
class_name = "KnowledgeSyncWorkflow"
schedules = ["10 10 * * 1"]

[[workflows]]
name = "session-summary"
binding = "WORKFLOW_SESSION_SUMMARY"
class_name = "SessionSummaryWorkflow"

[[workflows]]
name = "biomechanics-analysis"
binding = "WORKFLOW_BIOMECHANICS_ANALYSIS"
class_name = "BiomechanicsAnalysisWorkflow"

[[workflows]]
name = "automation-executor"
binding = "WORKFLOW_AUTOMATION"
class_name = "AutomationExecutor"

# ===== DURABLE OBJECTS =====
[[durable_objects.bindings]]
name = "ORGANIZATION_STATE"
class_name = "OrganizationState"

[[durable_objects.bindings]]
name = "PATIENT_AGENT"
class_name = "PatientAgent"

[[durable_objects.bindings]]
name = "ASSESSMENT_LIVE_SESSION"
class_name = "AssessmentLiveSession"

[[durable_objects.bindings]]
name = "CLINIC_AGENT"
class_name = "ClinicAgent"

[[durable_objects.bindings]]
name = "VOICE_SCRIBE_AGENT"
class_name = "VoiceScribeAgent"

[[durable_objects.bindings]]
name = "EVOLUTION_COLLABORATION"
class_name = "EvolutionCollaboration"

[[migrations]]
tag = "v1"

[[migrations]]
tag = "v2"

[[migrations]]
tag = "v3"

[[migrations]]
tag = "v4"

[[migrations]]
tag = "v5"

[[migrations]]
tag = "v6"
new_classes = ["PatientAgent"]

[[migrations]]
tag = "v7"
new_classes = ["AssessmentLiveSession"]

[[migrations]]
tag = "v8"
new_classes = ["ClinicAgent"]

[[migrations]]
tag = "v9"
new_sqlite_classes = ["VoiceScribeAgent"]

[[migrations]]
tag = "v10"
new_classes = ["EvolutionCollaboration"]

# PatientAgent/ClinicAgent estendem o Agents SDK (requer SQLite), mas foram criados como
# KV (new_classes v6/v8) → setState falhava (500). Recria como SQLite. Sem perda de dados
# relevante (o estado nunca persistiu). KV→SQLite in-place não é suportado pela Cloudflare.
[[migrations]]
tag = "v11"
deleted_classes = ["PatientAgent", "ClinicAgent"]
new_sqlite_classes = ["PatientAgent", "ClinicAgent"]

# ===== AI & BROWSER RENDERING =====
[ai]
binding = "AI"

[browser]
binding = "BROWSER"

# ===== QUEUES =====
[[queues.producers]]
queue = "fisioflow-background-tasks"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "fisioflow-background-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "fisioflow-tasks-dlq"


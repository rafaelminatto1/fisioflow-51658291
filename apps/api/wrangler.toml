# ===== CRON TRIGGERS =====
[triggers]
crons = [
  "* * * * *",  # A cada minuto — Health monitor (notifica no ntfy.sh se API cair)
  "0 9 * * *",  # Diário às 06:00 BRT - Lembretes de Consultas (banco já acorda aqui)
  "0 11 * * *", # Diário às 08:00 BRT - Relatórios e Limpeza (horário de expediente)
  "0 12 * * *", # Diário às 09:00 BRT - Automações de vencimento de tarefas
  "0 5 * * *",  # Diário às 02:00 BRT - WikiSyncWorkflow (indexa páginas Wiki modificadas)
  "0 6 * * 1",  # Segunda às 03:00 BRT - KnowledgeSyncWorkflow (protocolos + exercícios)
  "30 10 * * *", # Diário às 07:30 BRT - ClinicAgent morning briefing
  "30 21 * * *", # Diário às 18:30 BRT - ClinicAgent daily summary
  "0 12 * * 1",  # Segunda às 09:00 BRT - ClinicAgent missing patients alert
]


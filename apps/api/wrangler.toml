name = "fisioflow-api"
main = "src/index.ts"
compatibility_date = "2026-03-25"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[placement]
mode = "smart"

# ===== ROTAS (SUBDOMINIOS CUSTOMIZADOS) =====
routes = [
  { pattern = "api-pro.moocafisio.com.br", custom_domain = true },
  { pattern = "api-paciente.moocafisio.com.br", custom_domain = true }
]


# ===== HYPERDRIVE (Neon PostgreSQL) =====
# Crie com: wrangler hyperdrive create fisioflow-neon \
#   --connection-string="postgresql://neondb_owner:<PASSWORD>@ep-wandering-bonus-acj4zwvo-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "12b9fefcfbc04074a63342a9212e1b4f"
# Query caching is configured on the Hyperdrive resource itself via:
#   wrangler hyperdrive update <id> --max-age <seconds> --swr <seconds>
# Cloudflare requires `--swr` to be lower than `--max-age`.

# ===== CLOUDFLARE R2 (Media Storage) =====
# Crie com: wrangler r2 bucket create fisioflow-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media"

# ===== KV NAMESPACES (Global Cache) =====
[[kv_namespaces]]
binding = "FISIOFLOW_CONFIG"
id = "4284b33fa7ed40b6bc9c59b6041c03ed"

# ===== D1 SQL (Edge SQLite — evolution_index, feriados, rate limiting) =====
# fisioflow-db: índice de evoluções, feriados nacionais
[[d1_databases]]
binding = "DB"
database_name = "fisioflow-db"
database_id = "bf781be2-527d-471d-9cf2-dd18f8e6c2b2"

# fisioflow-edge-cache: query_cache genérico, rate_limits por organização
[[d1_databases]]
binding = "EDGE_CACHE"
database_name = "fisioflow-edge-cache"
database_id = "9eba3eb7-5486-49d0-9684-c325f8b1ddc2"

# ===== ANALYTICS ENGINE (Observabilidade em tempo real — Free) =====
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "fisioflow_events"

# ===== VECTORIZE (Base de Conhecimento RAG) =====
# Crie com: wrangler vectorize create fisioflow-clinical --dimensions=768 --metric=cosine
[[vectorize]]
binding = "CLINICAL_KNOWLEDGE"
index_name = "fisioflow-clinical"

# ===== AI SEARCH (RAG gerenciado — wiki, protocolos, exercícios) =====
# Crie no dashboard: AI > AI Search > New Index
# [[ai_search]]
# binding = "AI_SEARCH"
# instance_name = "fisioflow-knowledge"

# ===== PIPELINES (Data warehouse → R2 JSON, open beta grátis) =====
# Pipeline: fisioflow_events (id: 584a8a3054d1437686b35823f8476fde)
# Stream: fisioflow_events_stream (id: 701aff68d26e4c45a29f090389bcd4f2)
# Stream endpoint: https://701aff68d26e4c45a29f090389bcd4f2.ingest.cloudflare.com
[[pipelines]]
binding = "EVENTS_PIPELINE"
pipeline = "701aff68d26e4c45a29f090389bcd4f2"

# ===== WORKFLOWS (Automações duráveis multi-step) =====
[[workflows]]
name = "appointment-reminder"
binding = "WORKFLOW_APPOINTMENT_REMINDER"
class_name = "AppointmentReminderWorkflow"

[[workflows]]
name = "patient-onboarding"
binding = "WORKFLOW_PATIENT_ONBOARDING"
class_name = "PatientOnboardingWorkflow"

[[workflows]]
name = "nfse-emission"
binding = "WORKFLOW_NFSE"
class_name = "NFSeWorkflow"

[[workflows]]
name = "hep-compliance"
binding = "WORKFLOW_HEP_COMPLIANCE"
class_name = "HEPComplianceWorkflow"

[[workflows]]
name = "patient-discharge"
binding = "WORKFLOW_DISCHARGE"
class_name = "PatientDischargeWorkflow"

[[workflows]]
name = "patient-reengagement"
binding = "WORKFLOW_REENGAGEMENT"
class_name = "PatientReengagementWorkflow"

# ===== DURABLE OBJECTS (Realtime State & Agents) =====
[[durable_objects.bindings]]
name = "ORGANIZATION_STATE"
class_name = "OrganizationState"

[[durable_objects.bindings]]
name = "PATIENT_AGENT"
class_name = "PatientAgent"


[[migrations]]
tag = "v1" # Placeholder

[[migrations]]
tag = "v2" # Placeholder

[[migrations]]
tag = "v3" # Placeholder

[[migrations]]
tag = "v4" # Placeholder

[[migrations]]
tag = "v5" # Placeholder to match remote state

[[migrations]]
tag = "v6" # New migration to add PatientAgent
new_classes = ["PatientAgent"]

# ===== AI & BROWSER RENDERING (Paid Plan) =====
[ai]
binding = "AI"

[browser]
binding = "BROWSER"

# ===== QUEUES (Asynchronous Tasks) =====
[[queues.producers]]
queue = "fisioflow-background-tasks"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "fisioflow-background-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "fisioflow-tasks-dlq"

# ===== VARIÁVEIS DE AMBIENTE =====
[vars]
ENVIRONMENT = "production"
# Habilita transformações de imagem via URL no painel Cloudflare
IMAGE_TRANSFORMATIONS = "enabled"
R2_PUBLIC_URL = "https://media.moocafisio.com.br"
# Turnstile (anti-bot para rotas públicas) — sitekey pública, secret via wrangler secret put
TURNSTILE_SITE_KEY = ""
# CORS: domínio do frontend em Cloudflare Pages
ALLOWED_ORIGINS = "https://moocafisio.com.br,https://www.moocafisio.com.br,https://minatto-fisio.pages.dev,https://fisioflow.pages.dev,https://minatto.moocafisio.com.br,https://media.moocafisio.com.br,http://localhost:5173,https://7d2bdf7d.fisioflow.pages.dev,https://fisioflow-web.rafalegollas.workers.dev,https://fisioflow-api.rafalegollas.workers.dev"
GOOGLE_MAPS_API_KEY = ""
# Neon Auth JWT verification (obrigatório para rotas protegidas)
# Ajuste para os valores reais do seu tenant Neon Auth.
NEON_AUTH_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth"
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"
NEON_AUTH_ISSUER = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
NEON_AUTH_AUDIENCE = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"

# Hasura (Produção)
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql"
# VITE_HASURA_ADMIN_SECRET deve ser setado via: wrangler secret put VITE_HASURA_ADMIN_SECRET

# Axiom Logging (Produção)
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs"
# AXIOM_TOKEN deve ser setado via 'wrangler secret put AXIOM_TOKEN'

# Cloudflare AI Gateway
# Troque <ACCOUNT_ID> e <GATEWAY_NAME> pelos seus dados no painel da Cloudflare (AI > AI Gateway)
FISIOFLOW_AI_GATEWAY_URL = "https://gateway.ai.cloudflare.com/v1/32156f9a72a32d1ece28ab74bcd398fb/fisioflow-gateway"

# Inngest (Produção)
# INNGEST_EVENT_KEY e INNGEST_SIGNING_KEY devem ser setados via wrangler secret


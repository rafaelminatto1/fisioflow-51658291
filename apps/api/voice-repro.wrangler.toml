# Harness temporário p/ depurar o VoiceScribeAgent isolado (não deployar)
name = "voice-repro"
main = "scripts/voiceRepro.ts"
compatibility_date = "2026-06-06"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "VOICE_SCRIBE_AGENT", class_name = "VoiceScribeAgent" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VoiceScribeAgent"]

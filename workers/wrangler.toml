name = "fisioflow-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ===== ROTAS (SUBDOMINIOS CUSTOMIZADOS) =====
routes = [
  { pattern = "api-pro.moocafisio.com.br", custom_domain = true },
  { pattern = "api-paciente.moocafisio.com.br", custom_domain = true }
]


# ===== HYPERDRIVE (Neon PostgreSQL) =====
# Crie com: wrangler hyperdrive create fisioflow-neon \
#   --connection-string="postgresql://neondb_owner:<PASSWORD>@ep-wandering-bonus-acj4zwvo-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "12b9fefcfbc04074a63342a9212e1b4f"

# ===== CLOUDFLARE R2 (Media Storage) =====
# Crie com: wrangler r2 bucket create fisioflow-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media"

# ===== DURABLE OBJECTS (Realtime State) =====
[[durable_objects.bindings]]
name = "ORGANIZATION_STATE"
class_name = "OrganizationState"

[[migrations]]
tag = "v1" # Initial migration for real-time state
new_classes = ["OrganizationState"]

# ===== AI & BROWSER RENDERING (Paid Plan) =====
[ai]
binding = "AI"

[browser]
binding = "BROWSER"

# ===== QUEUES (Asynchronous Tasks) =====
[[queues.producers]]
queue = "fisioflow-background-tasks"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "fisioflow-background-tasks"
max_batch_size = 10
max_batch_timeout = 30

# ===== VARIÁVEIS DE AMBIENTE =====
[vars]
ENVIRONMENT = "production"
# Habilita transformações de imagem via URL no painel Cloudflare
IMAGE_TRANSFORMATIONS = "enabled" 
# CORS: domínio do frontend em Cloudflare Pages
ALLOWED_ORIGINS = "https://minatto-fisio.pages.dev,https://fisioflow.pages.dev,https://moocafisio.com.br,https://www.moocafisio.com.br,https://media.moocafisio.com.br,http://localhost:5173,https://7d2bdf7d.fisioflow.pages.dev"
GOOGLE_MAPS_API_KEY = ""
# Neon Auth JWT verification (obrigatório para rotas protegidas)
# Ajuste para os valores reais do seu tenant Neon Auth.
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"
NEON_AUTH_ISSUER = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
NEON_AUTH_AUDIENCE = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"

# Hasura (Produção)
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql"
VITE_HASURA_ADMIN_SECRET = "0phHoTnXL6XUIqvIHDiTi01XlvCmov2aYvoOC60hthgwDm6ZVZcIoSVG7mkZZLc1"

# Axiom Logging (Produção)
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs"
# AXIOM_TOKEN deve ser setado via 'wrangler secret put AXIOM_TOKEN'

# Inngest (Produção)
# INNGEST_EVENT_KEY e INNGEST_SIGNING_KEY devem ser setados via wrangler secret

# ===== AMBIENTE DE STAGING =====
[env.staging]
name = "fisioflow-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
ALLOWED_ORIGINS = "https://fisioflow-staging.pages.dev,http://localhost:5173"
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"

# Hasura (Staging)
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql" # Mude para staging se desejar

# Axiom (Staging)
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs-staging"

# Inngest (Staging)
INNGEST_EVENT_KEY = "9wvvKcSTUi2STGzvwEImNg_j1XUcKjUgP-o-1HfIt-j9eKulwyfV-B1J95OXTKSHoO3huyTgcZCI6b5AEMD-xw"

[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "DEVE_SER_CRIADO_NO_DASHBOARD" # wrangler hyperdrive create fisioflow-neon-staging
caching = { max_age = 30 }

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media-staging"

# ===== CRON TRIGGERS =====
[triggers]
crons = [
  "0 9 * * *",   # Diário às 09:00 - Lembretes de Consultas
  "0 0 * * *",   # Diário à meia-noite - Relatórios e Limpeza
]

# ===== OBSERVABILIDADE =====
[observability]
enabled = true

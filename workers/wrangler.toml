name = "fisioflow-api"
main = "src/index.ts"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[placement]
mode = "smart"

# ===== ROTAS (SUBDOMINIOS CUSTOMIZADOS) =====
routes = [
  { pattern = "api-pro.moocafisio.com.br", custom_domain = true },
  { pattern = "api-paciente.moocafisio.com.br", custom_domain = true }
]


# ===== HYPERDRIVE (Neon PostgreSQL) =====
# Crie com: wrangler hyperdrive create fisioflow-neon \
#   --connection-string="postgresql://neondb_owner:<PASSWORD>@ep-wandering-bonus-acj4zwvo-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require"
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "12b9fefcfbc04074a63342a9212e1b4f"

# ===== CLOUDFLARE R2 (Media Storage) =====
# Crie com: wrangler r2 bucket create fisioflow-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media"

# ===== DURABLE OBJECTS (Realtime State) =====
[[durable_objects.bindings]]
name = "ORGANIZATION_STATE"
class_name = "OrganizationState"

[[migrations]]
tag = "v1" # Initial migration for real-time state
new_classes = ["OrganizationState"]

# ===== AI & BROWSER RENDERING (Paid Plan) =====
[ai]
binding = "AI"

[browser]
binding = "BROWSER"

# ===== QUEUES (Asynchronous Tasks) =====
[[queues.producers]]
queue = "fisioflow-background-tasks"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "fisioflow-background-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "fisioflow-tasks-dlq"

# ===== VARIÁVEIS DE AMBIENTE =====
[vars]
ENVIRONMENT = "production"
# Habilita transformações de imagem via URL no painel Cloudflare
IMAGE_TRANSFORMATIONS = "enabled" 
R2_PUBLIC_URL = "https://media.moocafisio.com.br"
# CORS: domínio do frontend em Cloudflare Pages
ALLOWED_ORIGINS = "https://minatto-fisio.pages.dev,https://fisioflow.pages.dev,https://moocafisio.com.br,https://www.moocafisio.com.br,https://minatto.moocafisio.com.br,https://media.moocafisio.com.br,http://localhost:5173,https://7d2bdf7d.fisioflow.pages.dev,https://fisioflow-web.rafalegollas.workers.dev,https://fisioflow-api.rafalegollas.workers.dev"
GOOGLE_MAPS_API_KEY = ""
# Neon Auth JWT verification (obrigatório para rotas protegidas)
# Ajuste para os valores reais do seu tenant Neon Auth.
NEON_AUTH_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth"
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"
NEON_AUTH_ISSUER = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
NEON_AUTH_AUDIENCE = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"

# Hasura (Produção)
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql"
# VITE_HASURA_ADMIN_SECRET deve ser setado via: wrangler secret put VITE_HASURA_ADMIN_SECRET

# Axiom Logging (Produção)
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs"
# AXIOM_TOKEN deve ser setado via 'wrangler secret put AXIOM_TOKEN'

# Inngest (Produção)
# INNGEST_EVENT_KEY e INNGEST_SIGNING_KEY devem ser setados via wrangler secret

# ===== AMBIENTE DE PRODUCAO =====
[env.production]
name = "fisioflow-api"

[env.production.vars]
ENVIRONMENT = "production"
IMAGE_TRANSFORMATIONS = "enabled"
R2_PUBLIC_URL = "https://media.moocafisio.com.br"
ALLOWED_ORIGINS = "https://minatto-fisio.pages.dev,https://fisioflow.pages.dev,https://moocafisio.com.br,https://www.moocafisio.com.br,https://minatto.moocafisio.com.br,https://media.moocafisio.com.br,http://localhost:5173,https://7d2bdf7d.fisioflow.pages.dev,https://fisioflow-web.rafalegollas.workers.dev,https://fisioflow-api.rafalegollas.workers.dev"
GOOGLE_MAPS_API_KEY = ""
NEON_AUTH_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth"
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"
NEON_AUTH_ISSUER = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
NEON_AUTH_AUDIENCE = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql"
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs"

[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "12b9fefcfbc04074a63342a9212e1b4f"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media"

[env.production.durable_objects]
bindings = [
  { name = "ORGANIZATION_STATE", class_name = "OrganizationState" }
]

[env.production.ai]
binding = "AI"

[env.production.browser]
binding = "BROWSER"

[[env.production.queues.producers]]
queue = "fisioflow-background-tasks"
binding = "BACKGROUND_QUEUE"

[[env.production.queues.consumers]]
queue = "fisioflow-background-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "fisioflow-tasks-dlq"

# ===== AMBIENTE DE STAGING =====
[env.staging]
name = "fisioflow-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
IMAGE_TRANSFORMATIONS = "enabled"
R2_PUBLIC_URL = "https://media.moocafisio.com.br"
ALLOWED_ORIGINS = "https://fisioflow-staging.pages.dev,http://localhost:5173"
GOOGLE_MAPS_API_KEY = ""
NEON_AUTH_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth"
NEON_AUTH_JWKS_URL = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech/neondb/auth/.well-known/jwks.json"
NEON_AUTH_ISSUER = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"
NEON_AUTH_AUDIENCE = "https://ep-wandering-bonus-acj4zwvo.neonauth.sa-east-1.aws.neon.tech"

# Hasura (Staging)
VITE_HASURA_PROJECT_URL = "https://capital-duckling-42.hasura.app/v1/graphql" # Mude para staging se desejar

# Axiom (Staging)
AXIOM_ORG_ID = "activity-dbyc"
AXIOM_DATASET = "fisioflow-logs-staging"

# Inngest (Staging)
# INNGEST_EVENT_KEY deve ser setado via: wrangler secret put INNGEST_EVENT_KEY --env staging

[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "37189eb42d314a0a8fd0e169a2b27ad1"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "fisioflow-media-staging"

[env.staging.durable_objects]
bindings = [
  { name = "ORGANIZATION_STATE", class_name = "OrganizationState" }
]

[env.staging.ai]
binding = "AI"

[env.staging.browser]
binding = "BROWSER"

[[env.staging.queues.producers]]
queue = "fisioflow-background-tasks-staging"
binding = "BACKGROUND_QUEUE"

[[env.staging.queues.consumers]]
queue = "fisioflow-background-tasks-staging"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "fisioflow-tasks-dlq-staging"

# ===== CRON TRIGGERS =====
[triggers]
crons = [
  "0 9 * * *",   # Diário às 09:00 - Lembretes de Consultas
  "0 0 * * *",   # Diário à meia-noite - Relatórios e Limpeza
]

# ===== OBSERVABILIDADE =====
[observability]
enabled = true

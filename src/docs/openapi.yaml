openapi: 3.1.0
info:
  title: FisioFlow API
  description: |
    API da FisioFlow — Cloudflare Worker (Hono) + Neon Postgres via Hyperdrive.
    Autenticação: JWT do Neon Auth no header `Authorization: Bearer <token>` (validado via JWKS).
    Os endpoints sob `/api/health/*` são públicos. Paths derivados de `apps/api/src/routes/*`.
  version: 3.0.0
servers:
  - url: https://fisioflow-api.rafalegollas.workers.dev
    description: Produção (Cloudflare Worker)
  - url: http://localhost:8787
    description: Desenvolvimento local (pnpm workers:dev)
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Patients
  - name: Appointments
  - name: Sessions
  - name: Exercises
  - name: Boards & Tarefas
  - name: Clinical
  - name: Financial
  - name: Packages
  - name: Reports
  - name: Commissions
  - name: NFS-e
  - name: CRM
  - name: Marketing
  - name: Gamification
  - name: AI
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Serviço no ar
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  time: { type: string, format: date-time }
                  env: { type: string, example: production }
  /api/health/ready:
    get:
      tags: [Health]
      summary: Readiness check
      security: []
      responses:
        "200": { description: Pronto }
  /api/health/db:
    get:
      tags: [Health]
      summary: Conectividade com o banco
      security: []
      responses:
        "200": { description: Banco acessível }
  /api/patients:
    get:
      tags: [Patients]
      summary: Lista pacientes
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive] }
      responses:
        "200":
          description: Lista de pacientes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Patient" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Patients]
      summary: Cria paciente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatientInput" }
      responses:
        "201":
          description: Paciente criado
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Patient" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/patients/{id}:
    parameters:
      - $ref: "#/components/parameters/IdPath"
    get:
      tags: [Patients]
      summary: Detalha paciente
      responses:
        "200":
          description: Paciente
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Patient" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Patients]
      summary: Atualiza paciente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatientInput" }
      responses:
        "200": { description: Atualizado }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/appointments:
    get:
      tags: [Appointments]
      summary: Lista agendamentos
      responses:
        "200": { description: Lista de agendamentos }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Appointments]
      summary: Cria agendamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, start]
              properties:
                patientId: { type: string, format: uuid }
                start: { type: string, format: date-time }
                durationMin: { type: integer, example: 50 }
      responses:
        "201": { description: Agendamento criado }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/sessions:
    get:
      tags: [Sessions]
      summary: Lista sessões/evoluções
      parameters:
        - in: query
          name: patientId
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Lista de sessões }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/exercises:
    get:
      tags: [Exercises]
      summary: Lista exercícios
      responses:
        "200": { description: Lista de exercícios }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/protocols:
    get:
      tags: [Exercises]
      summary: Lista protocolos
      responses:
        "200": { description: Lista de protocolos }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/boards:
    get:
      tags: [Boards & Tarefas]
      summary: Lista boards
      responses:
        "200": { description: Lista de boards }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/tarefas:
    get:
      tags: [Boards & Tarefas]
      summary: Lista tarefas
      responses:
        "200": { description: Lista de tarefas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/evolution-versions:
    get:
      tags: [Clinical]
      summary: Lista versões de evolução
      parameters:
        - in: query
          name: patientId
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Lista de versões }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/standardized-tests:
    get:
      tags: [Clinical]
      summary: Lista resultados de testes padronizados (PROMs)
      responses:
        "200": { description: Lista de resultados }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/financial/transactions:
    get:
      tags: [Financial]
      summary: Lista transações financeiras
      responses:
        "200": { description: Lista de transações }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/financial/accounts:
    get:
      tags: [Financial]
      summary: Lista contas
      responses:
        "200": { description: Lista de contas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/financial/cost-centers:
    get:
      tags: [Financial]
      summary: Lista centros de custo
      responses:
        "200": { description: Lista de centros de custo }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/packages:
    get:
      tags: [Packages]
      summary: Lista pacotes de atendimento
      responses:
        "200": { description: Lista de pacotes }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/packages/stats:
    get:
      tags: [Packages]
      summary: Estatísticas de pacotes
      responses:
        "200": { description: Estatísticas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/packages/patient/{patientId}:
    get:
      tags: [Packages]
      summary: Pacotes de um paciente
      parameters:
        - in: path
          name: patientId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Pacotes do paciente }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/reports/medical-templates:
    get:
      tags: [Reports]
      summary: Lista templates de laudo
      responses:
        "200": { description: Lista de templates }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/reports/medical:
    get:
      tags: [Reports]
      summary: Lista laudos médicos
      responses:
        "200": { description: Lista de laudos }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/reports/convenio:
    get:
      tags: [Reports]
      summary: Relatórios de convênio
      responses:
        "200": { description: Relatórios }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/commissions/summary:
    get:
      tags: [Commissions]
      summary: Resumo de comissões
      responses:
        "200": { description: Resumo }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/commissions/config:
    get:
      tags: [Commissions]
      summary: Configuração de comissões
      responses:
        "200": { description: Configuração }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/nfse:
    get:
      tags: [NFS-e]
      summary: Lista NFS-e
      responses:
        "200": { description: Lista de NFS-e }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/nfse/config:
    get:
      tags: [NFS-e]
      summary: Configuração NFS-e
      responses:
        "200": { description: Configuração }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/nfse/test-connection:
    get:
      tags: [NFS-e]
      summary: Testa conexão mTLS com a prefeitura (SP)
      description: Requer auth. Retorna 422 se o certificado não estiver configurado e 502 se o serviço externo falhar.
      responses:
        "200": { description: Conexão OK }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { description: Certificado não configurado }
        "502": { description: Falha no serviço externo }
  /api/crm/leads:
    get:
      tags: [CRM]
      summary: Lista leads
      responses:
        "200": { description: Lista de leads }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/crm/campanhas:
    get:
      tags: [CRM]
      summary: Lista campanhas
      responses:
        "200": { description: Lista de campanhas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/crm/tarefas:
    get:
      tags: [CRM]
      summary: Lista tarefas de CRM
      responses:
        "200": { description: Lista de tarefas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/marketing/content-calendar:
    get:
      tags: [Marketing]
      summary: Calendário de conteúdo
      responses:
        "200": { description: Calendário }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/marketing/recall-campaigns:
    get:
      tags: [Marketing]
      summary: Campanhas de recall
      responses:
        "200": { description: Campanhas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/marketing/ltv-maximizer/opportunities:
    get:
      tags: [Marketing]
      summary: Oportunidades de LTV
      responses:
        "200": { description: Oportunidades }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/gamification/leaderboard:
    get:
      tags: [Gamification]
      summary: Ranking
      responses:
        "200": { description: Ranking }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/gamification/achievement-definitions:
    get:
      tags: [Gamification]
      summary: Definições de conquistas
      responses:
        "200": { description: Definições }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/gamification/admin/stats:
    get:
      tags: [Gamification]
      summary: Estatísticas (admin)
      responses:
        "200": { description: Estatísticas }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/ai/search:
    post:
      tags: [AI]
      summary: Busca assistida por IA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, example: "protocolo para lombalgia" }
      responses:
        "200": { description: Resultados da busca }
        "401": { $ref: "#/components/responses/Unauthorized" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT do Neon Auth.
  parameters:
    IdPath:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
  responses:
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Patient:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        status: { type: string, enum: [active, inactive] }
        createdAt: { type: string, format: date-time }
    PatientInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
    Error:
      type: object
      properties:
        error: { type: string }

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Spacing Scale</title></head>
<body>
<div style="display:flex;flex-direction:column;gap:6px;font-family:var(--font-mono);font-size:11px;">
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:4px;height:14px;background:hsl(var(--primary));"></div>1 · 4px</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:8px;height:14px;background:hsl(var(--primary));"></div>2 · 8px</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:12px;height:14px;background:hsl(var(--primary));"></div>3 · 12px</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:16px;height:14px;background:hsl(var(--primary));"></div>4 · 16px · input padding</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:24px;height:14px;background:hsl(var(--primary));"></div>6 · 24px · card padding</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:32px;height:14px;background:hsl(var(--primary));"></div>8 · 32px · section gap</div>
  <div style="display:flex;align-items:center;gap:10px;"><div style="width:48px;height:14px;background:hsl(var(--primary));"></div>12 · 48px · page gutter</div>
</div>
</body></html>

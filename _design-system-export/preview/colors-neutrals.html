<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Neutrals</title></head>
<body>
<div class="row">
  <div class="swatch" style="background:hsl(210 20% 98%);color:hsl(224 71% 4%);"><div class="name">background</div><div class="meta">210 20% 98%</div></div>
  <div class="swatch" style="background:hsl(0 0% 100%);color:hsl(224 71% 4%);border:1px solid hsl(var(--border));"><div class="name">card</div><div class="meta">0 0% 100%</div></div>
  <div class="swatch" style="background:hsl(220 14.3% 95.9%);color:hsl(220 39% 11%);"><div class="name">muted / secondary</div><div class="meta">220 14% 96%</div></div>
  <div class="swatch" style="background:hsl(220 13% 91%);color:hsl(224 71% 4%);"><div class="name">border</div><div class="meta">220 13% 91%</div></div>
  <div class="swatch" style="background:hsl(220 8.9% 46.1%);color:white;"><div class="name">muted-fg</div><div class="meta">220 9% 46%</div></div>
  <div class="swatch" style="background:hsl(224 71.4% 4.1%);color:white;"><div class="name">foreground</div><div class="meta">224 71% 4%</div></div>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Status Colors</title></head>
<body>
<div class="row">
  <div class="swatch" style="background:#10b981;color:white;flex:1;"><div class="name">Confirmado</div><div class="meta">#10B981</div></div>
  <div class="swatch" style="background:#f59e0b;color:#3a2300;flex:1;"><div class="name">Pendente</div><div class="meta">#F59E0B</div></div>
  <div class="swatch" style="background:#ef4444;color:white;flex:1;"><div class="name">Cancelado</div><div class="meta">#EF4444</div></div>
  <div class="swatch" style="background:#3b82f6;color:white;flex:1;"><div class="name">Realizado</div><div class="meta">#3B82F6</div></div>
</div>
<div style="display:flex;gap:8px;margin-top:14px;">
  <span class="chip" style="background:#10b98120;color:#047857;">● CONFIRMADO</span>
  <span class="chip" style="background:#f59e0b20;color:#92400e;">● PENDENTE</span>
  <span class="chip" style="background:#ef444420;color:#991b1b;">● CANCELADO</span>
  <span class="chip" style="background:#3b82f620;color:#1e40af;">● REALIZADO</span>
</div>
</body></html>

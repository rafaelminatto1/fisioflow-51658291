<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Shadow Scale</title></head>
<body>
<div style="display:flex;gap:18px;padding:14px 4px;">
  <div style="flex:1;height:80px;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">flat · default</div>
  <div style="flex:1;height:80px;background:hsl(var(--card));border-radius:14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">sm</div>
  <div style="flex:1;height:80px;background:hsl(var(--card));border-radius:14px;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">md · hover</div>
  <div style="flex:1;height:80px;background:hsl(var(--card));border-radius:14px;box-shadow:var(--shadow-popover);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;">popover</div>
</div>
<div style="font-size:11px;color:hsl(var(--muted-foreground));margin-top:4px;">Cards são flat por padrão. Shadow só em hover, popover/dropdown, dialog.</div>
</body></html>

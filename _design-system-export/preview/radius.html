<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Radius Scale</title></head>
<body>
<div style="display:flex;gap:16px;align-items:flex-end;">
  <div style="width:90px;height:90px;background:hsl(var(--primary));border-radius:12px;display:flex;align-items:flex-end;padding:8px;color:white;font-size:11px;font-weight:600;">sm · 12px<br/><span style="opacity:.75;">badges</span></div>
  <div style="width:90px;height:90px;background:hsl(var(--primary));border-radius:14px;display:flex;align-items:flex-end;padding:8px;color:white;font-size:11px;font-weight:600;">md · 14px<br/><span style="opacity:.75;">inputs</span></div>
  <div style="width:90px;height:90px;background:hsl(var(--primary));border-radius:16px;display:flex;align-items:flex-end;padding:8px;color:white;font-size:11px;font-weight:600;">lg · 16px<br/><span style="opacity:.75;">cards</span></div>
  <div style="width:90px;height:90px;background:hsl(var(--primary));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:600;">full<br/>pill</div>
  <div style="font-size:11px;color:hsl(var(--muted-foreground));max-width:200px;">Base <code style="font-family:var(--font-mono);">--radius: 1rem</code> (16px). Outros derivam por <code style="font-family:var(--font-mono);">calc()</code>.</div>
</div>
</body></html>

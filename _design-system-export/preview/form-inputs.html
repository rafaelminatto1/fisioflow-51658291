<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Form Inputs</title></head>
<body>
<div style="display:flex;flex-direction:column;gap:10px;">
  <div>
    <div style="font-size:12px;font-weight:500;margin-bottom:4px;">E-mail</div>
    <input style="width:100%;height:40px;padding:0 14px;border:1px solid hsl(var(--input));border-radius:14px;font-family:inherit;font-size:14px;background:hsl(var(--card));" placeholder="paciente@email.com"/>
  </div>
  <div style="display:flex;gap:8px;">
    <input style="flex:1;height:40px;padding:0 14px;border:2px solid hsl(var(--primary));border-radius:14px;font-family:inherit;font-size:14px;background:hsl(var(--card));outline:none;" value="João Silva"/>
    <input style="flex:1;height:40px;padding:0 14px;border:1px solid hsl(var(--destructive));border-radius:14px;font-family:inherit;font-size:14px;background:hsl(var(--card));" value="CPF inválido"/>
  </div>
  <textarea style="width:100%;padding:10px 14px;border:1px solid hsl(var(--input));border-radius:14px;font-family:inherit;font-size:14px;background:hsl(var(--card));resize:none;" rows="2" placeholder="Evolução clínica..."></textarea>
</div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"><title>Badges</title></head>
<body>
<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
  <span class="chip" style="background:hsl(var(--primary));color:white;">CONSULTA</span>
  <span class="chip" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground));">SEM VÍDEO</span>
  <span class="chip" style="background:hsl(158 64% 42%);color:white;">VÍDEO</span>
  <span class="chip" style="background:hsl(0 84% 60%);color:white;">CANCELADO</span>
  <span class="chip" style="background:transparent;color:hsl(var(--foreground));border:1px solid hsl(var(--border));">FISIOTERAPEUTA</span>
  <span class="chip" style="background:hsl(211 100% 96%);color:hsl(211 100% 30%);">NOVO</span>
  <span class="chip" style="background:hsl(var(--secondary));color:hsl(var(--secondary-foreground));">PRO</span>
  <span class="chip" style="background:hsl(45 93% 47%);color:#3a2300;">⚠ 5 pacientes sem retorno</span>
</div>
<div style="margin-top:10px;font-size:11px;color:hsl(var(--muted-foreground));">Variants: default · secondary · destructive · outline · domain (NOVO, PRO, alerta).</div>
</body></html>

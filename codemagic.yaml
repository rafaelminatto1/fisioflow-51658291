workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        # Usa a identidade exata configurada com "check verde" na interface
        provisioning_profiles:
          - fisioflow_pro_adhoc
      vars:
        APP_DIR: "apps/professional-app"
        BUNDLE_ID: "com.fisioflow.professionals"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --clean --non-interactive
      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          cd $APP_DIR/ios

          # Initialize keychain
          keychain initialize

          # Configura o Xcode usando o perfil específico injetado
          xcode-project use-profiles --project "FisioFlowPro.xcodeproj"

          export WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export SCHEME="FisioFlowPro"

          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"

          # Evita falha do Sentry no archive quando sourcemaps nao estao disponiveis no CI
          export SENTRY_DISABLE_AUTO_UPLOAD=true

          # Xcode 26.2 e build-ipa do Codemagic estao falhando no archive/export para ad-hoc.
          # Arquiva manualmente com destino iOS generico e empacota o .ipa a partir do .xcarchive.
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/xcarchive/FisioFlowPro.xcarchive \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            SKIP_INSTALL=NO

          APP_PATH=$(find build/ios/xcarchive/FisioFlowPro.xcarchive/Products -name "*.app" -maxdepth 3 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERRO: Nenhum .app encontrado no archive"
            find build/ios/xcarchive/FisioFlowPro.xcarchive -type d | head -20
            exit 1
          fi

          APP_NAME=$(basename "$APP_PATH" .app)
          IPA_STAGE=build/ios/ipa-stage
          IPA_OUT=build/ios/ipa

          rm -rf "$IPA_STAGE" "$IPA_OUT"
          mkdir -p "$IPA_STAGE/Payload" "$IPA_OUT"
          cp -R "$APP_PATH" "$IPA_STAGE/Payload/"

          (
            cd "$IPA_STAGE"
            zip -qr "../ipa/${APP_NAME}.ipa" Payload
          )

          echo "IPA gerado em $IPA_OUT/${APP_NAME}.ipa"
    artifacts:
      - apps/professional-app/ios/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

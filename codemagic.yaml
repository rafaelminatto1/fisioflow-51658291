workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.npm
        - ~/.eas-build-local-nodejs
    environment:
      node: latest
      xcode: 16
      cocoapods: default
      groups:
        - expo
      vars:
        APP_DIR: "apps/professional-app"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli
      - name: EAS Build iOS (ad-hoc)
        script: |
          cd $APP_DIR
          # EAS handles: prebuild, CocoaPods, code signing, xcodebuild, export
          # credentialsSource: "remote" in eas.json — no manual signing needed
          eas build \
            --platform ios \
            --profile preview \
            --local \
            --non-interactive \
            --output /tmp/FisioFlowPro.ipa
    artifacts:
      - /tmp/FisioFlowPro.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

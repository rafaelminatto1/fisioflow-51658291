workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.fisioflow.professionals
        # Reference name cadastrado no painel do Codemagic
        provisioning_profiles:
          - fisioflow_pro_adhoc
      vars:
        APP_DIR: "apps/professional-app"
        BUNDLE_ID: "com.fisioflow.professionals"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          cd $APP_DIR/ios
          
          # Initialize keychain
          keychain initialize
          
          # Configura o Xcode usando os perfis injetados pelo Codemagic
          xcode-project use-profiles --project "FisioFlowPro.xcodeproj"
          
          export WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | grep -A 5 "Schemes:" | tail -n +2 | head -1 | xargs)
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
    artifacts:
      - apps/professional-app/ios/build/remote/ipa/*.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: 22
      xcode: 16.4
      cocoapods: default
      vars:
        APP_DIR: "apps/professional-app"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
      groups:
        - expo
        - appstore  # CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE

    triggering:
      events:
        - push

    # Code signing is auto-configured via CM_* environment variables
    # No need for ios_signing block when using manual signing

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - ~/.cocoapods/repos
        - ~/.npm
        - $APP_DIR/ios/Pods

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force

      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate ios/)
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --clean

      - name: Patch Podfile for signing
        script: |
          cd $APP_DIR/ios
          ruby -e '
            podfile = File.read("Podfile")
            # Improved hook to disable signing for ALL pod targets and match deployment target
            new_code = "
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"
                  config.build_settings[\"DEVELOPMENT_TEAM\"] = \"\"
                  config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"16.0\"
                end
              end
            "
            if podfile.include?("post_install do |installer|")
              podfile.gsub!("post_install do |installer|", "post_install do |installer|#{new_code}")
            else
              podfile += "\npost_install do |installer|\n#{new_code}\nend\n"
            end
            File.write("Podfile", podfile)
          '

      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install

      - name: Set up code signing
        script: |
          # Find actual project name
          PROJECT=$(find "$CM_BUILD_DIR/$APP_DIR/ios" -name "*.xcodeproj" -maxdepth 1 | head -1)
          echo "Using project: $PROJECT"
          
          # 1. Install the provisioning profile manually so Xcode can find it
          # Using the UUID we extracted: 33c33a27-a698-4984-9461-2f2383749de9
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$CM_BUILD_DIR/FisioFlow_Profissionais_AdHoc.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/33c33a27-a698-4984-9461-2f2383749de9.mobileprovision

          # 2. Install certificates/profiles from CM environment if any
          xcode-project use-profiles --project "$PROJECT"

          # 3. Create ExportOptions.plist using UUID for the profile
          cat <<EOF > "$CM_BUILD_DIR/$APP_DIR/ios/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>G7FDW933SF</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fisioflow.professionals</key>
                  <string>33c33a27-a698-4984-9461-2f2383749de9</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA (ad-hoc)
        script: |
          # Find actual workspace and scheme
          WORKSPACE=$(find "$CM_BUILD_DIR/$APP_DIR/ios" -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)

          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          # Create build directory
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive"

          # Build archive forcing UUID and TeamID
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/FisioFlowPro.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=G7FDW933SF \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="33c33a27-a698-4984-9461-2f2383749de9" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            archive

          # Export IPA from archive
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/FisioFlowPro.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/$APP_DIR/ios/ExportOptions.plist" \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

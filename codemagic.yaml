workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - fisioflow_pro_adhoc_push_2026
      vars:
        APP_DIR: "apps/professional-app"
        BUNDLE_ID: "com.fisioflow.professionals"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          cd $APP_DIR/ios
          keychain initialize
          xcode-project use-profiles --project "FisioFlowPro.xcodeproj"
          
          export WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export SCHEME="FisioFlowPro"
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Tentativa de build direta para capturar erros de compilação Swift
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO | grep -A 5 "error:" || true

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --log-stream stdout
    artifacts:
      - apps/professional-app/ios/build/remote/ipa/*.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: 16.4
      cocoapods: default
      vars:
        APP_DIR: "apps/professional-app"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
        XCODE_PROJECT: "apps/professional-app/ios/FisioFlowPro.xcodeproj"
        XCODE_WORKSPACE: "apps/professional-app/ios/FisioFlowPro.xcworkspace"
        XCODE_SCHEME: "FisioFlowPro"
        BUNDLE_ID: "com.fisioflow.professionals"
      groups:
        - expo
        - appstore

    triggering:
      events:
        - push

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - ~/.cocoapods/repos
        - ~/.npm
        - $APP_DIR/ios/Pods

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force

      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Expo prebuild (generate ios/)
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --clean

      - name: Patch Podfile for signing
        script: |
          cd $APP_DIR/ios
          ruby -e '
            podfile = File.read("Podfile")
            # Improved hook to disable signing for ALL pod targets and match deployment target
            new_code = "
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"
                  config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"
                  config.build_settings[\"DEVELOPMENT_TEAM\"] = \"\"
                  config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"16.0\"
                end
              end
            "
            if podfile.include?("post_install do |installer|")
              podfile.gsub!("post_install do |installer|", "post_install do |installer|#{new_code}")
            else
              podfile += "\npost_install do |installer|\n#{new_code}\nend\n"
            end
            File.write("Podfile", podfile)
          '

      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install

      - name: Initialize keychain and set up code signing
        script: |
          keychain initialize
          
          # 1. Install certificate from environment variable
          if [ -z "$CM_CERTIFICATE" ]; then
            echo "ERRO: CM_CERTIFICATE não encontrada. Certifique-se de que a variável está no grupo 'appstore' no Codemagic."
            exit 1
          fi
          
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # 2. Install provisioning profile from repo
          # UUID: 33c33a27-a698-4984-9461-2f2383749de9
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp "$CM_BUILD_DIR/FisioFlow_Profissionais_AdHoc.mobileprovision" "$PROFILES_HOME/33c33a27-a698-4984-9461-2f2383749de9.mobileprovision"
          
          # 3. List identities for debug
          security find-identity -v -p codesigning
          
          # 4. Create ExportOptions.plist manually
          cat <<EOF > "$CM_BUILD_DIR/$APP_DIR/ios/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>G7FDW933SF</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.fisioflow.professionals</key>
                  <string>33c33a27-a698-4984-9461-2f2383749de9</string>
              </dict>
          </dict>
          </plist>
          EOF

      - name: Build IPA (ad-hoc)
        script: |
          # Create build directory
          mkdir -p "$CM_BUILD_DIR/build/ios/xcarchive"

          # Build archive with explicit signing
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/FisioFlowPro.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=G7FDW933SF \
            PROVISIONING_PROFILE="33c33a27-a698-4984-9461-2f2383749de9" \
            archive

          # Export IPA from archive
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/FisioFlowPro.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/$APP_DIR/ios/ExportOptions.plist" \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

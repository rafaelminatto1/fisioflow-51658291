workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    cache:
      cache_paths:
        - ~/.cocoapods/repos
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.fisioflow.professionals
      vars:
        APP_DIR: "apps/professional-app"
        BUNDLE_ID: "com.fisioflow.professionals"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          # Ensure CDN trunk repo is registered (avoids raw.githubusercontent.com fallback)
          pod repo list | grep -q "trunk" || pod repo add-cdn trunk https://cdn.cocoapods.org/
          # Retry up to 3 times to handle transient 429 rate-limit errors from GitHub CDN
          for attempt in 1 2 3; do
            echo "CocoaPods install attempt $attempt/3"
            pod install --repo-update && break
            if [ $attempt -eq 3 ]; then
              echo "pod install failed after 3 attempts"
              exit 1
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
      - name: Build iOS IPA
        script: |
          cd $APP_DIR/ios
          keychain initialize
          xcode-project use-profiles --project "FisioFlowPro.xcodeproj"
          
          export WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export SCHEME="FisioFlowPro"
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --log-stream stdout
    artifacts:
      - apps/professional-app/ios/build/remote/ipa/*.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br

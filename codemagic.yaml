workflows:
  ios-professional-app:
    name: FisioFlow Pro iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        # Usa a identidade exata configurada com "check verde" na interface
        provisioning_profiles:
          - fisioflow_pro_adhoc
      vars:
        APP_DIR: "apps/professional-app"
        BUNDLE_ID: "com.fisioflow.professionals"
        EXPO_PUBLIC_API_URL: "https://moocafisio.com.br/api"
        CI: "true"
    triggering:
      events:
        - push
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm --force
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Expo Prebuild
        script: |
          cd $APP_DIR
          npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd $APP_DIR/ios
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          cd $APP_DIR/ios
          
          # Initialize keychain
          keychain initialize
          
          # Configura o Xcode usando o perfil específico injetado
          xcode-project use-profiles --project "FisioFlowPro.xcodeproj"
          
          export WORKSPACE=$(ls -d *.xcworkspace | head -1)
          export SCHEME="FisioFlowPro"
          
          echo "Building Workspace: $WORKSPACE with Scheme: $SCHEME"
          
          # Executa um build bruto apenas para capturar o erro exato no log do Codemagic
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -archivePath build.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO || true
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --log-stream stdout \
            --verbose
    artifacts:
      - apps/professional-app/ios/build/remote/ipa/*.ipa
    publishing:
      email:
        recipients:
          - rafael@moocafisio.com.br
